# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true

# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: true
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台（100% 稳定无报错）
# ===============================================================
platforms:
  enabled: true
  sources:
    - id: "baidu"
      name: "百度热搜"
    - id: "zhihu"
      name: "知乎热榜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls"
      name: "财联社"
    - id: "hackernews"
      name: "Hacker News"
    - id: "producthunt"
      name: "Product Hunt"

# ===============================================================
# 3. 数据源 - RSS 关闭
# ===============================================================
rss:
  enabled: false
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds: []

# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "current"
  display_mode: "platform"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

# ===============================================================
# 4.5 筛选策略
# ===============================================================
filter:
  method: "keyword"
  priority_sort_enabled: true

# ===============================================================
# 4.6 AI 智能筛选
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.4
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - hotlist
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: false
    standalone: false
    ai_analysis: true
  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: []
    max_items: 20

# ===============================================================
# 6. 推送通知
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

# ===============================================================
# 8. AI 模型（已修复 NVIDIA + Kimi 协议问题）
# ===============================================================
ai:
  model: "openai/moonshotai/kimi-k2.5"
  api_key: ""
  api_base: "https://integrate.api.nvidia.com/v1"
  timeout: 120
  temperature: 0.7
  max_tokens: 4096
  num_retries: 2
  fallback_models: []

# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 100
  include_rss: false
  include_standalone: true
  include_rank_timeline: false

# ===============================================================
# 10. AI 翻译（关闭）
# ===============================================================
ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: false
    standalone: false

# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:8080"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
